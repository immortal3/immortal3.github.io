    <script>
        // Configure autoloader path
        Prism.plugins.autoloader.languages_path = 'https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/';

        document.addEventListener('DOMContentLoaded', function () {
            Prism.highlightAll();

            document.querySelectorAll('.markdown-body pre').forEach(function (pre) {
                var code_el = pre.querySelector('code');
                if (code_el && code_el.classList.contains('language-mermaid')) return;
                if (pre.querySelector('.code-copy-button')) return;

                var btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'code-copy-button';
                btn.textContent = 'Copy';

                btn.addEventListener('click', function () {
                    var text = code_el ? code_el.textContent : pre.textContent;
                    navigator.clipboard.writeText(text).then(function () {
                        btn.textContent = 'Copied';
                        btn.classList.add('copied');
                        setTimeout(function () {
                            btn.textContent = 'Copy';
                            btn.classList.remove('copied');
                        }, 1500);
                    });
                });

                pre.style.position = 'relative';
                pre.appendChild(btn);
            });
        });

        // Mermaid initialization
        if (document.querySelector('.language-mermaid')) {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js';
            script.onload = () => {
                mermaid.initialize({
                    startOnLoad: true,
                    theme: 'default',
                    flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' },
                    securityLevel: 'loose',
                });
                // Replace mermaid code blocks with div.mermaid
                document.querySelectorAll('pre code.language-mermaid').forEach(el => {
                    const pre = el.parentElement;
                    const div = document.createElement('div');
                    div.className = 'mermaid';
                    div.textContent = el.textContent;
                    pre.parentElement.replaceChild(div, pre);
                });
                mermaid.init(undefined, '.mermaid');
            };
            document.head.appendChild(script);
        }

        // Twitter/X embeds
        if (document.querySelector('.twitter-tweet') && !window.twttr) {
            const script = document.createElement('script');
            script.src = 'https://platform.twitter.com/widgets.js';
            script.async = true;
            script.charset = 'utf-8';
            document.head.appendChild(script);
        } else if (window.twttr && window.twttr.widgets) {
            window.twttr.widgets.load();
        }
