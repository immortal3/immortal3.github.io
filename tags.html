    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <script>
        // Configure autoloader path
        Prism.plugins.autoloader.languages_path = 'https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/';

        // Highlight on load
        document.addEventListener('DOMContentLoaded', function () {
            Prism.highlightAll();

            document.querySelectorAll('pre code[class*="language-"]:not(.language-mermaid)').forEach(function (codeEl) {
                const pre = codeEl.parentElement;
                if (!pre) return;

                if (pre.querySelector('.code-copy-button')) return;

                const copyButton = document.createElement('button');
                copyButton.type = 'button';
                copyButton.className = 'code-copy-button';
                copyButton.textContent = 'Copy';

                copyButton.addEventListener('click', async function () {
                    const codeText = codeEl.textContent || '';

                    try {
                        if (navigator.clipboard && window.isSecureContext) {
                            await navigator.clipboard.writeText(codeText);
                        } else {
                            const textArea = document.createElement('textarea');
                            textArea.value = codeText;
                            textArea.setAttribute('readonly', '');
                            textArea.style.position = 'absolute';
                            textArea.style.left = '-9999px';
                            document.body.appendChild(textArea);
                            textArea.select();
                            document.execCommand('copy');
                            document.body.removeChild(textArea);
                        }

                        copyButton.textContent = 'Copied';
                        window.setTimeout(function () {
                            copyButton.textContent = 'Copy';
                        }, 1500);
                    } catch (error) {
                        copyButton.textContent = 'Failed';
                        window.setTimeout(function () {
                            copyButton.textContent = 'Copy';
                        }, 1500);
                    }
                });

                pre.appendChild(copyButton);
            });
        });

        // Mermaid initialization
        if (document.querySelector('.language-mermaid')) {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js';
            script.onload = () => {
                mermaid.initialize({
                    startOnLoad: true,
                    theme: 'default',
                    flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' },
                    securityLevel: 'loose',
                });
                // Replace mermaid code blocks with div.mermaid
                document.querySelectorAll('pre code.language-mermaid').forEach(el => {
                    const pre = el.parentElement;
                    const div = document.createElement('div');
                    div.className = 'mermaid';
                    div.textContent = el.textContent;
                    pre.parentElement.replaceChild(div, pre);
                });
                mermaid.init(undefined, '.mermaid');
            };
            document.head.appendChild(script);
        }

        // Twitter/X embeds
        if (document.querySelector('.twitter-tweet') && !window.twttr) {
            const script = document.createElement('script');
            script.src = 'https://platform.twitter.com/widgets.js';
            script.async = true;
            script.charset = 'utf-8';
            document.head.appendChild(script);
        } else if (window.twttr && window.twttr.widgets) {
            window.twttr.widgets.load();
        }

        // Reading progress bar
